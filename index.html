<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solfege Bird</title>

<style>
@font-face {
  font-family: "GameUI";
  src: url("./assets/fonts/ui.otf");
}

body {
  margin: 0;
  display: grid;
  place-items: center;
  background: linear-gradient(#73c6fb, #d9f3ff);
  font-family: GameUI, sans-serif;
}

.wrap { width: 900px; }

.toolbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

canvas {
  width: 100%;
  border-radius: 20px;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="toolbar">
    <div>
      <button id="micBtn">Enable Microphone</button>
      <button id="startBtn">Start Game</button>
    </div>
    <div id="statusText">Mic not enabled</div>
  </div>

  <canvas id="game" width="800" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const micBtn = document.getElementById("micBtn");
const startBtn = document.getElementById("startBtn");
const statusText = document.getElementById("statusText");

const WIDTH = 800;
const HEIGHT = 600;

const STATE_MENU = "menu";
const STATE_PLAYING = "playing";

const FALL_SPEED = 1;
const FALL_ACCEL = 0.03;
const MAX_FALL_SPEED = 3;

const game = {
  state: STATE_MENU,
  started: false,
  countdown: 0,
  countdownTimer: 0,
  birdY: HEIGHT / 2,
  birdFallSpeed: FALL_SPEED,
  pipeX: WIDTH + 120,
  pipeY: 150,
  gap: 200,
  audio: {
    enabled: false,
    analyser: null,
    audioContext: null,
    timeData: null,
    currentPitch: 0,
    currentRms: 0,
  }
};

/* ================= MIC ================= */
async function enableMic() {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true }
  });

  const ctxAudio = new AudioContext();
  const src = ctxAudio.createMediaStreamSource(stream);
  const analyser = ctxAudio.createAnalyser();
  analyser.fftSize = 2048;

  src.connect(analyser);

  game.audio.analyser = analyser;
  game.audio.audioContext = ctxAudio;
  game.audio.timeData = new Float32Array(analyser.fftSize);
  game.audio.enabled = true;

  statusText.textContent = "Mic enabled";
}

/* ================= AUDIO ================= */
function updateAudio() {
  const a = game.audio;
  if (!a.enabled) return;

  a.analyser.getFloatTimeDomainData(a.timeData);

  let rms = 0;
  for (let i = 0; i < 1024; i++) {
    rms += a.timeData[i] * a.timeData[i];
  }
  rms = Math.sqrt(rms / 1024);

  a.currentRms = rms;
}

/* ================= GAME ================= */
function resetRun() {
  game.birdY = HEIGHT / 2;
  game.birdFallSpeed = FALL_SPEED;
  game.pipeX = WIDTH + 120;
  game.started = false;

  game.countdown = 3;
  game.countdownTimer = 60;
}

function updateGame() {
  updateAudio();

  if (game.state === STATE_PLAYING) {

    // COUNTDOWN
    if (game.countdown >= 0) {
      game.countdownTimer--;
      if (game.countdownTimer <= 0) {
        game.countdown--;
        game.countdownTimer = 60;
      }

      game.birdY = HEIGHT / 2;
      draw();
      requestAnimationFrame(updateGame);
      return;
    }

    game.started = true;

    // FALL LOGIC
    if (game.audio.currentRms > 0.002) {
      game.birdY -= 2;
    } else {
      game.birdY += game.birdFallSpeed;
      game.birdFallSpeed = Math.min(MAX_FALL_SPEED, game.birdFallSpeed + FALL_ACCEL);
    }

    // PIPE
    game.pipeX -= 4;
    if (game.pipeX < -100) {
      game.pipeX = WIDTH + 120;
      game.pipeY = Math.random() * 300 + 100;
    }
  }

  draw();
  requestAnimationFrame(updateGame);
}

/* ================= DRAW ================= */
function draw() {
  ctx.clearRect(0,0,WIDTH,HEIGHT);

  ctx.fillStyle = "#87ceeb";
  ctx.fillRect(0,0,WIDTH,HEIGHT);

  // PIPE
  ctx.fillStyle = "green";
  ctx.fillRect(game.pipeX, 0, 80, game.pipeY);
  ctx.fillRect(game.pipeX, game.pipeY + game.gap, 80, HEIGHT);

  // BIRD
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(150, game.birdY, 15, 0, Math.PI*2);
  ctx.fill();

  // MENU
  if (game.state === STATE_MENU) {
    drawText("SOLFEGE BIRD", WIDTH/2, 120);
    drawText("Enable Mic → Start", WIDTH/2, 200);
  }

  // COUNTDOWN
  if (game.state === STATE_PLAYING && game.countdown >= 0) {
    let text = game.countdown > 0 ? game.countdown : "SING!";
    drawText(text, WIDTH/2, HEIGHT/2, 60);
  }
}

function drawText(text, x, y, size=40){
  ctx.fillStyle = "white";
  ctx.font = size + "px GameUI";
  ctx.textAlign = "center";
  ctx.fillText(text, x, y);
}

/* ================= EVENTS ================= */
micBtn.onclick = enableMic;

startBtn.onclick = () => {
  if (!game.audio.enabled) {
    statusText.textContent = "Enable mic first";
    return;
  }
  resetRun();
  game.state = STATE_PLAYING;
};

updateGame();
</script>
</body>
</html>
